<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WikiLite</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Header -->
    <header class="top-bar">
        <div style="display:flex; align-items:center;">
            <button id="menuToggle" class="menu-toggle" title="Toggle Menu">☰</button>
            <button id="themeToggle" class="theme-toggle" title="Toggle Dark Mode">🌙</button>
            <div class="logo">Wiki<strong>Lite</strong> <span class="version">v0.0.2b</span></div>
        </div>
        
        <!-- Search Wrapper for Autocomplete -->
        <div class="search-wrapper">
            <input type="text" id="searchInput" placeholder="Search Wikipedia...">
            <button onclick="handleSearch()">Go</button>
            <ul id="suggestionsList" class="suggestions hidden"></ul>
        </div>
    </header>

    <!-- Backdrop for mobile sidebar & Lightbox -->
    <div class="backdrop" id="backdrop"></div>

    <!-- Lightbox Modal -->
    <div id="lightbox" class="lightbox hidden">
        <span class="close-lightbox">&times;</span>
        <img class="lightbox-content" id="lightbox-img">
        <div id="caption"></div>
    </div>

    <div class="container">
        <!-- Sidebar Navigation -->
        <aside class="sidebar">
            <h3>Navigation</h3>
            <ul id="navList">
                <li><a onclick="loadArticle('Welcome')">Main Page</a></li>
                <li><a onclick="loadRandomArticle()">Random Article</a></li>
            </ul>

            <h3>History</h3>
            <ul id="historyList">
                <li style="color:#888; font-size:0.8rem;">No history yet...</li>
            </ul>

            <h3 id="tocHeader" class="hidden">Contents</h3>
            <ul id="tocList"></ul>
            
            <div class="sidebar-tools">
                <hr>
                <small style="color:#888;">WikiLite connects to live Wikipedia API.</small>
            </div>
        </aside>

        <!-- Main Content Area -->
        <main class="content" id="mainContent">
            <div class="article-nav">
                <button id="backBtn" class="nav-btn" disabled>← Back</button>
                <span id="breadcrumb">Home</span>
            </div>

            <div class="article-header">
                <h1 id="articleTitle">Welcome</h1>
                <button id="editBtn" class="edit-btn hidden">Edit Local</button>
            </div>

            <!-- View Mode -->
            <div id="articleBody" class="wiki-text">
                Select an article from the sidebar or search to begin.
            </div>

            <!-- Search Results Page -->
            <div id="searchResultsContainer" class="search-results hidden">
                <ul id="searchResultsList"></ul>
            </div>

            <!-- Image Gallery -->
            <div id="imageGallery" class="gallery hidden">
                <h3>Images</h3>
                <div id="galleryGrid" class="gallery-grid"></div>
            </div>

            <!-- Edit/Create Mode Form -->
            <div id="editorContainer" class="hidden">
                <textarea id="editorTextarea" placeholder="Enter content here..."></textarea>
                <div class="editor-actions">
                    <button id="saveBtn" class="primary-btn">Save Page</button>
                    <button id="cancelBtn" class="secondary-btn">Cancel</button>
                </div>
            </div>

            <!-- Loading Spinner -->
            <div id="loading" class="hidden">
                <div class="spinner"></div>
            </div>
        </main>
    </div>

    <!-- Scripts -->
    <script src="api.js"></script>
    <script src="app.js"></script>
</body>
</html>
